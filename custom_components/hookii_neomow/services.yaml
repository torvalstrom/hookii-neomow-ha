start_region:
  name: Start region
  description: >-
    Start mowing only the selected zone(s), optionally overriding the cutting
    height. Queue several zones back-to-back by chaining calls from an automation.
  target:
    entity:
      integration: hookii_neomow
      domain: lawn_mower
  fields:
    regions:
      name: Zones
      description: >-
        One or more zone names (as listed in the mower's available_regions
        attribute) or numeric region IDs.
      required: true
      example: '["GardenNorth", "south"]'
      selector:
        object:
